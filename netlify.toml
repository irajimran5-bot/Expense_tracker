[build]
  command = "npm install && npm --prefix frontend install && npm --prefix frontend run build"
  publish = "frontend/dist"

[functions]
  directory = "netlify/functions"

# 1. Serverless API Redirect
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# 2. React Router SPA Catch-all 
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200